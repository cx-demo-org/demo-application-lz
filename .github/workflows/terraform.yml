name: terraform

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "feat/**"]
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        required: true
        default: plan
        options: [plan, apply, destroy]
      stack:
        description: "Which environment to run"
        type: choice
        required: true
        default: prod-sea
        options: [prod-sea, prod-weu]
      confirm:
        description: "Type APPLY or DESTROY to confirm destructive actions"
        type: string
        required: false
        default: ""
      force_apply:
        description: "Allow apply re-runs even if no new code changes exist"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: tf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 now (Node 20 deprecation notice).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_OIDC_AUDIENCE: api://AzureADTokenExchange

  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}

  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.stack) || '["prod-sea","prod-weu"]') }}

    # Keep a single GitHub Environment for OIDC scoping/approvals.
    environment: prod

    env:
      STACK: ${{ matrix.stack }}
      # Azure CLI context for login; set per stack to make az commands deterministic.
      # Terraform itself uses subscription_id from the selected env tfvars.
      ARM_SUBSCRIPTION_ID: ${{ matrix.stack == 'prod-weu' && vars.ARM_SUBSCRIPTION_ID_PROD_WEU || vars.ARM_SUBSCRIPTION_ID_PROD_SEA }}

    steps:
      - uses: actions/checkout@v6

      - name: Install tools (az, jq, unzip)
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y jq unzip

          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi

      - name: Azure login (OIDC via Azure CLI)
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "OIDC token env vars not available. Ensure permissions.id-token=write is set." >&2
            exit 1
          fi

          oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${ARM_OIDC_AUDIENCE}"
          token_json="$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${oidc_url}")"
          oidc_token="$(echo "${token_json}" | jq -r '.value')"

          if [[ -z "${oidc_token}" || "${oidc_token}" == "null" ]]; then
            echo "Failed to retrieve OIDC token. Response: ${token_json}" >&2
            exit 1
          fi

          az login --service-principal \
            --username "${ARM_CLIENT_ID}" \
            --tenant "${ARM_TENANT_ID}" \
            --federated-token "${oidc_token}" \
            --allow-no-subscriptions

          az account set --subscription "${ARM_SUBSCRIPTION_ID}"

      - name: Install Terraform 1.12.2
        shell: bash
        run: |
          set -euo pipefail

          version="1.12.2"
          url="https://releases.hashicorp.com/terraform/${version}/terraform_${version}_linux_amd64.zip"

          install_dir="${HOME}/bin"
          mkdir -p "${install_dir}"

          curl -fsSL -o terraform.zip "${url}"
          unzip -o terraform.zip -d "${install_dir}"
          echo "${install_dir}" >> "${GITHUB_PATH}"

          export PATH="${install_dir}:${PATH}"

          terraform version

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false -backend-config=environments/${{ env.STACK }}/backend.hcl

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.action }}" == "destroy" ]]; then
            terraform plan -destroy -input=false -no-color -var-file="environments/${{ env.STACK }}/terraform.tfvars" -out=tfplan
          else
            terraform plan -input=false -no-color -var-file="environments/${{ env.STACK }}/terraform.tfvars" -out=tfplan
          fi

      - name: Terraform plan summary
        if: always()
        shell: bash
        run: |
          if [[ -f tfplan ]]; then
            summary="$(terraform show -no-color tfplan | awk '
              /^No changes\./{line=$0}
              /^Plan: /{line=$0}
              END{print line}
            ')"

            if [[ -z "${summary}" ]]; then
              summary="Plan summary not found (see artifact)."
            fi

            echo "${summary}"
            {
              echo "### Terraform plan summary (${{ env.STACK }})"
              echo ""
              echo "\`${summary}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Plan output not available."
            {
              echo "### Terraform plan summary (${{ env.STACK }})"
              echo ""
              echo "Plan output not available."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Save plan output
        if: always()
        shell: bash
        run: |
          if [[ -f tfplan ]]; then
            terraform show -no-color tfplan > plan-${{ env.STACK }}.txt
          else
            echo "Plan output not available." > plan-${{ env.STACK }}.txt
          fi

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tfplan-${{ env.STACK }}
          path: plan-${{ env.STACK }}.txt
          if-no-files-found: warn

  apply:
    name: apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'

    environment: prod

    env:
      STACK: ${{ github.event.inputs.stack }}
      ARM_SUBSCRIPTION_ID: ${{ github.event.inputs.stack == 'prod-weu' && vars.ARM_SUBSCRIPTION_ID_PROD_WEU || vars.ARM_SUBSCRIPTION_ID_PROD_SEA }}

    steps:
      - uses: actions/checkout@v6

      - name: Install tools (az, jq, unzip)
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y jq unzip

          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi

      - name: Azure login (OIDC via Azure CLI)
        shell: bash
        run: |
          set -euo pipefail

          oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${ARM_OIDC_AUDIENCE}"
          token_json="$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${oidc_url}")"
          oidc_token="$(echo "${token_json}" | jq -r '.value')"

          if [[ -z "${oidc_token}" || "${oidc_token}" == "null" ]]; then
            echo "Failed to retrieve OIDC token. Response: ${token_json}" >&2
            exit 1
          fi

          az login --service-principal \
            --username "${ARM_CLIENT_ID}" \
            --tenant "${ARM_TENANT_ID}" \
            --federated-token "${oidc_token}" \
            --allow-no-subscriptions

          az account set --subscription "${ARM_SUBSCRIPTION_ID}"

      - name: Install Terraform 1.12.2
        shell: bash
        run: |
          set -euo pipefail

          version="1.12.2"
          url="https://releases.hashicorp.com/terraform/${version}/terraform_${version}_linux_amd64.zip"

          install_dir="${HOME}/bin"
          mkdir -p "${install_dir}"

          curl -fsSL -o terraform.zip "${url}"
          unzip -o terraform.zip -d "${install_dir}"
          echo "${install_dir}" >> "${GITHUB_PATH}"

          export PATH="${install_dir}:${PATH}"

          terraform version

      - name: Confirm apply
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "APPLY" ]]; then
            echo "Refusing to apply. Provide workflow input confirm=APPLY." >&2
            exit 1
          fi

      - name: Terraform apply
        shell: bash
        run: |
          set -euo pipefail

          stack="${{ env.STACK }}"

          echo "=== Applying ${stack} ==="
          rm -rf .terraform
          terraform init -input=false -reconfigure -backend-config="environments/${stack}/backend.hcl"
          terraform apply -lock-timeout=10m -input=false -auto-approve -var-file="environments/${stack}/terraform.tfvars"

  destroy:
    name: destroy
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    environment: prod

    env:
      STACK: ${{ github.event.inputs.stack }}
      ARM_SUBSCRIPTION_ID: ${{ github.event.inputs.stack == 'prod-weu' && vars.ARM_SUBSCRIPTION_ID_PROD_WEU || vars.ARM_SUBSCRIPTION_ID_PROD_SEA }}

    steps:
      - uses: actions/checkout@v6

      - name: Install tools (az, jq, unzip)
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y jq unzip

          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi

      - name: Azure login (OIDC via Azure CLI)
        shell: bash
        run: |
          set -euo pipefail

          oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${ARM_OIDC_AUDIENCE}"
          token_json="$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${oidc_url}")"
          oidc_token="$(echo "${token_json}" | jq -r '.value')"

          if [[ -z "${oidc_token}" || "${oidc_token}" == "null" ]]; then
            echo "Failed to retrieve OIDC token. Response: ${token_json}" >&2
            exit 1
          fi

          az login --service-principal \
            --username "${ARM_CLIENT_ID}" \
            --tenant "${ARM_TENANT_ID}" \
            --federated-token "${oidc_token}" \
            --allow-no-subscriptions

          az account set --subscription "${ARM_SUBSCRIPTION_ID}"

      - name: Install Terraform 1.12.2
        shell: bash
        run: |
          set -euo pipefail

          version="1.12.2"
          url="https://releases.hashicorp.com/terraform/${version}/terraform_${version}_linux_amd64.zip"

          install_dir="${HOME}/bin"
          mkdir -p "${install_dir}"

          curl -fsSL -o terraform.zip "${url}"
          unzip -o terraform.zip -d "${install_dir}"
          echo "${install_dir}" >> "${GITHUB_PATH}"

          export PATH="${install_dir}:${PATH}"

          terraform version

      - name: Confirm destroy
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "DESTROY" ]]; then
            echo "Refusing to destroy. Provide workflow input confirm=DESTROY." >&2
            exit 1
          fi

      - name: Terraform init
        shell: bash
        run: |
          set -euo pipefail

          stack="${{ env.STACK }}"

          echo "=== Init ${stack} ==="
          rm -rf .terraform
          terraform init -input=false -reconfigure -backend-config="environments/${stack}/backend.hcl"

      - name: Cleanup orphaned AKS/AppGW (when missing from state)
        shell: bash
        run: |
          set -euo pipefail

          stack="${{ env.STACK }}"
          prefix="demo-applz-aks-${stack}"
          rg="${prefix}-rg"
          aks_name="${prefix}"
          appgw_name="${prefix}-appgw"
          node_rg="${prefix}-node-rg"

          has_aks_in_state=false
          has_appgw_in_state=false

          if terraform state list 2>/dev/null | grep -q "^module\\.aks"; then
            has_aks_in_state=true
          fi

          if terraform state list 2>/dev/null | grep -q "^module\\.application_gateways"; then
            has_appgw_in_state=true
          fi

          echo "AKS in state: ${has_aks_in_state}"
          echo "AppGW in state: ${has_appgw_in_state}"

          # If these resources are NOT in Terraform state but exist in Azure,
          # they can block subnet deletes (InUseSubnetCannotBeDeleted).

          if [[ "${has_appgw_in_state}" != "true" ]]; then
            if az network application-gateway show -g "${rg}" -n "${appgw_name}" >/dev/null 2>&1; then
              echo "Deleting orphan App Gateway ${rg}/${appgw_name} ..."
              az network application-gateway delete -g "${rg}" -n "${appgw_name}" || true
              az network application-gateway wait -g "${rg}" -n "${appgw_name}" --deleted || true
            else
              echo "No orphan App Gateway found at ${rg}/${appgw_name}."
            fi
          fi

          if [[ "${has_aks_in_state}" != "true" ]]; then
            if az aks show -g "${rg}" -n "${aks_name}" >/dev/null 2>&1; then
              echo "Deleting orphan AKS cluster ${rg}/${aks_name} ..."
              az aks delete -g "${rg}" -n "${aks_name}" --yes --no-wait || true
              az aks wait -g "${rg}" -n "${aks_name}" --deleted || true
            else
              echo "No orphan AKS cluster found at ${rg}/${aks_name}."
            fi

            # If a node resource group exists, it can contain VMSS/NICs that still pin the subnet.
            if [[ "$(az group exists --name "${node_rg}")" == "true" ]]; then
              echo "Deleting orphan AKS node RG ${node_rg} ..."
              az group delete --name "${node_rg}" --yes --no-wait || true
              az group wait --name "${node_rg}" --deleted || true
            else
              echo "No orphan node RG found at ${node_rg}."
            fi
          fi

      - name: Terraform destroy
        shell: bash
        run: |
          set -euo pipefail

          stack="${{ env.STACK }}"

          echo "=== Destroying ${stack} ==="
          terraform destroy -lock-timeout=10m -input=false -auto-approve -var-file="environments/${stack}/terraform.tfvars"
